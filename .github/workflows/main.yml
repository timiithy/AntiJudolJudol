name: CI - Anti Judol Judol Club

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-backend:
    name: Build & Test Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies (Backend)
        working-directory: ./backend 
        run: npm install

      - name: Run tests (Backend)
        working-directory: ./backend
        run: npm test


  build-frontend:
    name: Build & Test Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies (Frontend)
        working-directory: ./frontend  
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

